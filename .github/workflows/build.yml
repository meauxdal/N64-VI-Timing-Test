name: Build N64 ROM

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/dragonminded/libdragon:latest

    strategy:
      matrix:
        preset:
          - NTSC
          - MPAL_MATH
          - MPAL_OLD
          - MPAL_PREVIEW
          - PAL_1996
          - PAL_1997

    env:
      N64_INST: /n64_toolchain
      LIBDRAGON_COMMIT: 7fee7254ef6b673a56c4bf6cc796fbb760173ab1

    steps:
      - uses: actions/checkout@v6

      - name: Cache libdragon build
        id: cache-libdragon
        uses: actions/cache@v5
        with:
          path: /n64_toolchain
          key: libdragon-${{ env.LIBDRAGON_COMMIT }}

      - name: Build libdragon
        if: steps.cache-libdragon.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/DragonMinded/libdragon.git /tmp/libdragon
          cd /tmp/libdragon
          git checkout $LIBDRAGON_COMMIT
          ./build.sh $N64_INST

      - name: Build ROM
        run: make PRESET=${{ matrix.preset }} all

      - name: Upload ROM
        uses: actions/upload-artifact@v7
        with:
          name: vi-timing-test-${{ matrix.preset }}
          path: vi_timing_test_${{ matrix.preset }}.z64
